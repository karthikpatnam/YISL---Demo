<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
</head>

<body>

<a-scene background="color: skyblue">

  <!-- Camera -->
  <a-entity camera wasd-controls look-controls position="0 1.6 6"></a-entity>

  <!-- Ground -->
  <a-plane rotation="-90 0 0" width="30" height="30" color="#e0e0e0"></a-plane>

  <!-- Revenue Bar -->
  <a-box id="bar" position="0 1 -3" width="1" depth="1" height="2" color="green"></a-box>

  <!-- Stats -->
  <a-text id="stats" position="-3 3 -3" color="black"></a-text>

  <!-- Level -->
  <a-text id="levelText" position="-1 4 -3" color="purple"></a-text>

  <!-- Decision Title -->
  <a-text id="decisionTitle" position="-1 2.5 -3" color="black" value="Choose Strategy"></a-text>

  <!-- OPTION 1 (Marketing) -->
  <a-plane 
    position="-2 1 -3" 
    width="2" height="1.5"
    src="https://cdn-icons-png.flaticon.com/512/1995/1995574.png"
    onclick="chooseMarketing()">
  </a-plane>
  <a-text position="-2 0 -3" value="Marketing Boost"></a-text>

  <!-- OPTION 2 (Quality Upgrade) -->
  <a-plane 
    position="2 1 -3" 
    width="2" height="1.5"
    src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png"
    onclick="chooseQuality()">
  </a-plane>
  <a-text position="2 0 -3" value="Improve Quality"></a-text>

  <!-- RUN DAY BUTTON -->
  <a-box position="0 0.5 -3" color="orange" onclick="runDay()"></a-box>
  <a-text position="0 -0.2 -3" value="Run Day"></a-text>

</a-scene>

<script>
let money = 1000;
let customers = 50;
let level = 1;
let decisionEffect = "";

function updateUI() {
  document.querySelector("#stats").setAttribute("value",
    "Money: ₹" + money +
    "\nCustomers: " + customers
  );

  document.querySelector("#levelText")
    .setAttribute("value", "Level " + level);

  let height = Math.max(1, money / 500);
  document.querySelector("#bar").setAttribute("height", height);
}

function chooseMarketing() {
  decisionEffect = "marketing";
  customers += 20;
  money -= 200;

  document.querySelector("#decisionTitle")
    .setAttribute("value", "You invested in Marketing 🚀");
  
  updateUI();
}

function chooseQuality() {
  decisionEffect = "quality";
  customers += 10;
  money -= 100;

  document.querySelector("#decisionTitle")
    .setAttribute("value", "You improved Product Quality ⭐");

  updateUI();
}

function runDay() {
  let revenue = customers * 10;
  money += revenue;

  // random event
  if (Math.random() < 0.4) {
    money += 300;
    document.querySelector("#decisionTitle")
      .setAttribute("value", "Viral Growth 📈");
  }

  // level up
  if (money > 3000 && level === 1) {
    level = 2;
    document.querySelector("#decisionTitle")
      .setAttribute("value", "Level Up! Expansion Unlocked 🏢");
  }

  updateUI();
}

updateUI();
</script>

</body>
</html>
