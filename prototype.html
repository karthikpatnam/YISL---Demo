<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VentureScape VR - Entrepreneurship Simulator</title>
    <!-- A-Frame CDN -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- A-Frame Environment Component -->
    <script
        src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }
    </style>
</head>

<body>
    <a-scene cursor="rayOrigin: mouse" raycaster="objects: .clickable">
        <!-- Assets -->
        <a-assets>
            <a-mixin id="button" geometry="primitive: box; width: 1.2; height: 0.3; depth: 0.15"
                material="color: #111; emissive: #0a0a0a; metalness: 0.9; roughness: 0.1"
                text="align: center; width: 3; color: #39FF14; font: kelsonsans" class="clickable"
                animation__mouseenter="property: material.emissive; from: #0a0a0a; to: #333; dur: 200; startEvents: mouseenter"
                animation__mouseleave="property: material.emissive; from: #333; to: #0a0a0a; dur: 200; startEvents: mouseleave"
                animation__click="property: scale; from: 1 1 1; to: 0.95 0.95 0.95; dur: 100; startEvents: click"></a-mixin>
        </a-assets>

        <!-- Environment: High-End Tech Aesthetic -->
        <a-entity
            environment="preset: contact; ground: flat; groundColor: #050505; grid: dots; gridColor: #39FF14; skyColor: #000; horizonColor: #111"></a-entity>

        <!-- Lights -->
        <a-light type="ambient" color="#333"></a-light>
        <a-light type="point" intensity="2" position="0 4 4" color="#39FF14"></a-light>

        <!-- Central Dashboard -->
        <a-entity id="main-dashboard" position="0 1.6 -4">
            <!-- Header -->
            <a-text value="VENTURE SCAPE" position="0 1.6 0" align="center" width="10" color="#39FF14" font="exo2bold"
                animation="property: scale; from: 1 1 1; to: 1.05 1.05 1.05; dur: 1500; dir: alternate; loop: true"></a-text>

            <!-- Business Metrics Panel -->
            <a-plane width="4.5" height="1.8"
                material="color: #000; transparent: true; opacity: 0.8; metalness: 0.6; side: double">
                <a-text id="money-display" value="CASH: $1,000" position="-2 0.5 0.1" width="6" color="#FFF"></a-text>
                <a-text id="price-display" value="UNIT PRICE: $10" position="-2 0.1 0.1" width="6"
                    color="#FFF"></a-text>
                <a-text id="customer-display" value="CUSTOMERS: 50" position="-2 -0.3 0.1" width="6"
                    color="#FFF"></a-text>

                <!-- Border lines for premium feel -->
                <a-entity line="start: -2.2 0.8 0.1; end: 2.2 0.8 0.1; color: #39FF14"></a-entity>
                <a-entity line="start: -2.2 -0.8 0.1; end: 2.2 -0.8 0.1; color: #39FF14"></a-entity>
            </a-plane>

            <!-- Valuation & Stock Market -->
            <a-plane position="0 -1.2 0.1" width="4.5" height="0.6"
                material="color: #0a0a0a; transparent: true; opacity: 0.9">
                <a-text id="valuation-display" value="VALUATION: $6,000" position="-2 0.1 0.05" width="5"
                    color="#FFD700" font="exo2bold"></a-text>
                <a-text id="stock-display" value="SHARE PRICE: $60.00" position="-2 -0.15 0.05" width="5"
                    color="#FFD700" font="exo2bold"></a-text>
            </a-plane>
        </a-entity>

        <!-- Revenue Visualization (Left Side) -->
        <a-entity id="revenue-viz" position="-4 0 -3" rotation="0 30 0">
            <a-box id="revenue-bar" position="0 0.05 0" width="1.2" height="0.1" depth="1.2"
                material="color: #39FF14; emissive: #111; metalness: 0.8">
                <a-text id="revenue-val-display" value="$500" position="0 0.2 0.7" align="center" width="5"
                    color="#39FF14" font="exo2bold"></a-text>
            </a-box>
            <a-text value="ANNUALIZED REVENUE" position="0 -0.4 0.8" align="center" width="4" color="#FFF"></a-text>
        </a-entity>

        <!-- Control Console (Right Side) -->
        <a-entity id="console" position="4 1.5 -3" rotation="0 -30 0">
            <a-text value="DIRECTIVES" position="0 1.0 0" align="center" width="6" color="#39FF14"
                font="exo2bold"></a-text>

            <a-entity id="btn-inc" mixin="button" position="0 0.5 0" text="value: INCREASE PRICE"></a-entity>
            <a-entity id="btn-dec" mixin="button" position="0 0 0" text="value: DECREASE PRICE"></a-entity>
            <a-entity id="btn-next" mixin="button" position="0 -0.7 0" material="color: #39FF14; emissive: #222"
                text="value: RUN SIMULATION; color: #000"></a-entity>
        </a-entity>

        <!-- Interaction Rig -->
        <a-entity id="player" position="0 0 2">
            <a-camera look-controls wasd-controls>
                <a-cursor fuse="false" raycaster="objects: .clickable" color="#39FF14" scale="0.6 0.6 0.6"></a-cursor>
            </a-camera>
        </a-entity>
    </a-scene>

    <script>
        const state = {
            cash: 1000,
            price: 10,
            customers: 50,
            revenue: 500,
            valuation: 6000,
            sharePrice: 60.00,
            day: 1
        };

        function updateSimulation() {
            // Supply/Demand: Q = Max(0, 100 - P * 5)
            state.customers = Math.max(0, 100 - (state.price * 5));
            state.revenue = state.price * state.customers;

            // Valuation = Cash + (Daily Revenue * 365 / 10) simplified multiplier
            state.valuation = (state.cash * 1.5) + (state.revenue * 10);
            state.sharePrice = state.valuation / 100;

            renderUI();
        }

        function renderUI(isSimulation = false) {
            document.querySelector('#money-display').setAttribute('value', `CASH: $${Math.floor(state.cash).toLocaleString()}`);
            document.querySelector('#price-display').setAttribute('value', `UNIT PRICE: $${state.price}`);
            document.querySelector('#customer-display').setAttribute('value', `CUSTOMERS: ${Math.floor(state.customers)}`);
            document.querySelector('#valuation-display').setAttribute('value', `VALUATION: $${Math.floor(state.valuation).toLocaleString()}`);
            document.querySelector('#stock-display').setAttribute('value', `SHARE PRICE: $${state.sharePrice.toFixed(2)}`);
            document.querySelector('#revenue-val-display').setAttribute('value', `$${Math.floor(state.revenue)}`);

            // Animate Revenue Bar
            const bar = document.querySelector('#revenue-bar');
            const targetHeight = Math.max(0.1, state.revenue / 200);

            bar.setAttribute('animation', {
                property: 'height',
                to: targetHeight,
                dur: 800,
                easing: 'easeOutQuad'
            });
            bar.setAttribute('position', { x: 0, y: targetHeight / 2, z: 0 });

            // Visual feedback for money
            document.querySelector('#money-display').setAttribute('color', state.cash < 0 ? '#ff3131' : '#fff');
        }

        document.querySelector('#btn-inc').addEventListener('click', () => {
            state.price++;
            updateSimulation();
        });

        document.querySelector('#btn-dec').addEventListener('click', () => {
            state.price = Math.max(1, state.price - 1);
            updateSimulation();
        });

        document.querySelector('#btn-next').addEventListener('click', () => {
            // Apply finances
            state.cash += state.revenue;
            state.cash -= (150 + (state.day * 5)); // Daily costs
            state.day++;

            updateSimulation();

            // Button feedback
            const btn = document.querySelector('#btn-next');
            btn.setAttribute('material', 'color', '#fff');
            setTimeout(() => btn.setAttribute('material', 'color', '#39FF14'), 100);
        });

        // Init
        updateSimulation();
    </script>
</body>

</html>
